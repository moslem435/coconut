<!DOCTYPE html>
<html>
<head>
    <title>Sync Debug Tool</title>
    <style>
        body {
            font-family: monospace;
            padding: 20px;
            background: #1e1e1e;
            color: #d4d4d4;
        }
        button {
            padding: 10px 20px;
            margin: 5px;
            background: #007acc;
            color: white;
            border: none;
            cursor: pointer;
            font-size: 14px;
        }
        button:hover {
            background: #005a9e;
        }
        #output {
            margin-top: 20px;
            padding: 15px;
            background: #252526;
            border: 1px solid #3e3e42;
            white-space: pre-wrap;
            max-height: 600px;
            overflow-y: auto;
        }
        .success { color: #4ec9b0; }
        .error { color: #f48771; }
        .warning { color: #dcdcaa; }
        .info { color: #9cdcfe; }
    </style>
</head>
<body>
    <h1>VFS ↔ WebContainer Sync Debug Tool</h1>
    
    <div>
        <button onclick="checkAppsFolder()">1. Check apps folder</button>
        <button onclick="manualSync()">2. Manual sync apps</button>
        <button onclick="clearOutput()">Clear output</button>
    </div>
    
    <div id="output"></div>

    <script>
        const output = document.getElementById('output');
        
        function log(msg, type = 'info') {
            const line = document.createElement('div');
            line.className = type;
            line.textContent = msg;
            output.appendChild(line);
            output.scrollTop = output.scrollHeight;
        }
        
        function clearOutput() {
            output.innerHTML = '';
        }
        
        async function checkAppsFolder() {
            clearOutput();
            log('🔍 Checking apps folder sync status...', 'info');
            log('');
            
            try {
                // Access stores from window (they should be available in the main app)
                const stores = await window.parent.eval(`
                    (async () => {
                        const { useFileSystemStore } = await import('/src/os/kernel/useFileSystemStore.ts');
                        const { useWebContainerStore } = await import('/src/os/kernel/useWebContainerStore.ts');
                        
                        const { files, getNodeByPath } = useFileSystemStore.getState();
                        const { instance } = useWebContainerStore.getState();
                        
                        const appsNode = getNodeByPath('/home/user/apps');
                        
                        let vfsChildren = [];
                        if (appsNode) {
                            vfsChildren = Object.values(files)
                                .filter(f => f.parentId === appsNode.id)
                                .map(c => ({ name: c.name, type: c.type, id: c.id }));
                        }
                        
                        let wcEntries = [];
                        if (instance) {
                            try {
                                const entries = await instance.fs.readdir('/apps', { withFileTypes: true });
                                wcEntries = entries.map(e => ({ name: e.name, isDir: e.isDirectory() }));
                            } catch (e) {
                                wcEntries = null;
                            }
                        }
                        
                        return {
                            hasAppsNode: !!appsNode,
                            appsNodeId: appsNode?.id,
                            vfsChildren,
                            hasInstance: !!instance,
                            wcEntries
                        };
                    })()
                `);
                
                log('📂 VFS Status:', 'info');
                if (stores.hasAppsNode) {
                    log(`  ✅ apps folder found (ID: ${stores.appsNodeId})`, 'success');
                    log(`  📄 Children: ${stores.vfsChildren.length}`, 'info');
                    stores.vfsChildren.forEach(c => {
                        const icon = c.type === 'folder' ? '📁' : '📄';
                        log(`    ${icon} ${c.name}`, 'info');
                    });
                } else {
                    log('  ❌ apps folder NOT found in VFS', 'error');
                }
                
                log('');
                log('📂 WebContainer Status:', 'info');
                if (!stores.hasInstance) {
                    log('  ❌ WebContainer not initialized', 'error');
                } else if (stores.wcEntries === null) {
                    log('  ❌ apps folder NOT found in WebContainer', 'error');
                } else {
                    log(`  ✅ apps folder found`, 'success');
                    log(`  📄 Children: ${stores.wcEntries.length}`, 'info');
                    stores.wcEntries.forEach(e => {
                        const icon = e.isDir ? '📁' : '📄';
                        log(`    ${icon} ${e.name}`, 'info');
                    });
                }
                
                log('');
                if (stores.hasAppsNode && stores.wcEntries === null) {
                    log('⚠️ apps folder exists in VFS but NOT in WebContainer!', 'warning');
                    log('   Click "Manual sync apps" to fix this.', 'warning');
                } else if (stores.hasAppsNode && stores.wcEntries !== null) {
                    const vfsNames = stores.vfsChildren.map(c => c.name);
                    const wcNames = stores.wcEntries.map(e => e.name);
                    const missing = vfsNames.filter(n => !wcNames.includes(n));
                    
                    if (missing.length > 0) {
                        log(`⚠️ ${missing.length} files missing in WebContainer:`, 'warning');
                        missing.forEach(n => log(`  - ${n}`, 'warning'));
                    } else {
                        log('✅ All files synced!', 'success');
                    }
                }
                
            } catch (e) {
                log(`❌ Error: ${e.message}`, 'error');
                log('');
                log('💡 Make sure you opened this page from the main app:', 'info');
                log('   Right-click in the app → Inspect → Console → Run:', 'info');
                log('   window.open("/debug-sync.html")', 'info');
            }
        }
        
        async function manualSync() {
            clearOutput();
            log('🔄 Manually syncing apps folder...', 'info');
            log('');
            
            try {
                const result = await window.parent.eval(`
                    (async () => {
                        const { useFileSystemStore } = await import('/src/os/kernel/useFileSystemStore.ts');
                        const { useWebContainerStore } = await import('/src/os/kernel/useWebContainerStore.ts');
                        
                        const { files, getNodeByPath, readFileContent } = useFileSystemStore.getState();
                        const { instance } = useWebContainerStore.getState();
                        
                        if (!instance) {
                            return { error: 'WebContainer not initialized' };
                        }
                        
                        const appsNode = getNodeByPath('/home/user/apps');
                        if (!appsNode) {
                            return { error: 'apps folder not found in VFS' };
                        }
                        
                        // Create apps folder
                        try {
                            await instance.fs.mkdir('/apps', { recursive: true });
                        } catch (e) {}
                        
                        // Sync all children
                        const syncNode = async (nodeId, wcPath, depth = 0) => {
                            const children = Object.values(files).filter(f => f.parentId === nodeId);
                            const synced = { folders: 0, files: 0 };
                            
                            for (const child of children) {
                                const childWCPath = wcPath + '/' + child.name;
                                
                                if (child.type === 'folder') {
                                    await instance.fs.mkdir(childWCPath, { recursive: true });
                                    synced.folders++;
                                    const subSynced = await syncNode(child.id, childWCPath, depth + 1);
                                    synced.folders += subSynced.folders;
                                    synced.files += subSynced.files;
                                } else {
                                    const content = await readFileContent(child.id);
                                    await instance.fs.writeFile(childWCPath, content);
                                    synced.files++;
                                }
                            }
                            
                            return synced;
                        };
                        
                        const synced = await syncNode(appsNode.id, '/apps');
                        return { success: true, synced };
                    })()
                `);
                
                if (result.error) {
                    log(`❌ ${result.error}`, 'error');
                } else {
                    log(`✅ Sync complete!`, 'success');
                    log(`  📁 Folders: ${result.synced.folders}`, 'info');
                    log(`  📄 Files: ${result.synced.files}`, 'info');
                    log('');
                    log('💡 Now check the terminal with: cd apps && ls', 'info');
                }
                
            } catch (e) {
                log(`❌ Error: ${e.message}`, 'error');
            }
        }
        
        log('💡 Debug tool loaded. Click buttons above to diagnose sync issues.', 'info');
    </script>
</body>
</html>
