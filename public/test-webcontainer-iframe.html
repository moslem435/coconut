<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebContainer Iframe Test</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            font-family: system-ui, -apple-system, sans-serif;
        }
        .controls {
            margin-bottom: 20px;
            padding: 15px;
            background: #f5f5f5;
            border-radius: 8px;
        }
        input {
            width: 100%;
            padding: 8px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        button {
            padding: 8px 16px;
            background: #0070f3;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover {
            background: #0051cc;
        }
        #status {
            margin-top: 10px;
            padding: 10px;
            border-radius: 4px;
        }
        .success {
            background: #d4edda;
            color: #155724;
        }
        .error {
            background: #f8d7da;
            color: #721c24;
        }
        .info {
            background: #d1ecf1;
            color: #0c5460;
        }
        iframe {
            width: 100%;
            height: 600px;
            border: 1px solid #ddd;
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <h1>WebContainer Iframe Test</h1>
    
    <div class="controls">
        <label for="urlInput">Enter WebContainer URL:</label>
        <input 
            type="text" 
            id="urlInput" 
            placeholder="https://xxx.local-corp.webcontainer.api.io"
            value="https://gqihe0qvkkdzfnah0h6udm3jh3nlo3-1tnf-5173-61636aac.local-corp.webcontainer.api.io"
        >
        <button onclick="loadIframe()">Load in Iframe</button>
        <button onclick="openNewTab()">Open in New Tab</button>
        <div id="status"></div>
    </div>

    <iframe id="testFrame" src="about:blank"></iframe>

    <script>
        const iframe = document.getElementById('testFrame');
        const urlInput = document.getElementById('urlInput');
        const status = document.getElementById('status');

        function updateStatus(message, type = 'info') {
            status.textContent = message;
            status.className = type;
        }

        function loadIframe() {
            const url = urlInput.value.trim();
            if (!url) {
                updateStatus('Please enter a URL', 'error');
                return;
            }

            updateStatus('Loading iframe...', 'info');
            console.log('[Test] Loading URL:', url);

            iframe.src = url;

            // Monitor load events
            iframe.onload = () => {
                console.log('[Test] Iframe loaded successfully');
                updateStatus('✓ Iframe loaded successfully', 'success');
            };

            iframe.onerror = (e) => {
                console.error('[Test] Iframe error:', e);
                updateStatus('✗ Failed to load iframe', 'error');
            };

            // Check if iframe is blocked after 3 seconds
            setTimeout(() => {
                try {
                    // Try to access iframe content (will fail for cross-origin)
                    const iframeDoc = iframe.contentDocument || iframe.contentWindow.document;
                    if (iframeDoc) {
                        console.log('[Test] Iframe document accessible');
                    }
                } catch (e) {
                    console.log('[Test] Iframe is cross-origin (expected):', e.message);
                }
            }, 3000);
        }

        function openNewTab() {
            const url = urlInput.value.trim();
            if (!url) {
                updateStatus('Please enter a URL', 'error');
                return;
            }
            window.open(url, '_blank');
            updateStatus('Opened in new tab', 'info');
        }

        // Auto-load on page load if URL is present
        if (urlInput.value) {
            loadIframe();
        }
    </script>
</body>
</html>
